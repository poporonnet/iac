apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: cluster-issuer-poporon-org
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: dev@laminne.jp
    privateKeySecretRef:
      name: cluster-issuer-key-poporon-org
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token-poporon-org
              key: api-token
