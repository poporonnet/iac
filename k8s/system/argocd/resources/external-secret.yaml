apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-repo-iac
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: argocd-repo-iac
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      type: Opaque
  data:
    - secretKey: type
      remoteRef:
        key: argocd-repo
        property: type
    - secretKey: url
      remoteRef:
        key: argocd-repo
        property: url
    - secretKey: githubAppID
      remoteRef:
        key: argocd-repo
        property: githubAppID
    - secretKey: githubAppInstallationID
      remoteRef:
        key: argocd-repo
        property: githubAppInstallationID
    - secretKey: githubAppPrivateKey
      remoteRef:
        key: argocd-repo
        property: githubAppPrivateKey
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-oidc
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: argocd-oidc
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
  data:
    - secretKey: client_id
      remoteRef:
        key: argocd-oidc
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: argocd-oidc
        property: client_secret
