apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: loki
resources:
  - ./resources/namespace.yaml
  - ./resources/external-secret.yaml
helmCharts:
  - name: loki
    repo: oci://ghcr.io/grafana-community/helm-charts
    version: "13.2.3"
    releaseName: loki
    namespace: loki
    valuesInline:
      deploymentMode: SingleBinary

      loki:
        auth_enabled: false
        commonConfig:
          replication_factor: 1
        storage:
          type: s3
          bucketNames:
            chunks: loki-chunks
            ruler: loki-ruler
          s3:
            endpoint: ${S3_ENDPOINT}
            region: ${S3_REGION}
            accessKeyId: ${AWS_ACCESS_KEY_ID}
            secretAccessKey: ${AWS_SECRET_ACCESS_KEY}
            s3ForcePathStyle: true
        ingester:
          chunk_encoding: snappy
        schemaConfig:
          configs:
            - from: "2024-01-01"
              store: tsdb
              object_store: s3
              schema: v13
              index:
                prefix: index_
                period: 24h

      singleBinary:
        replicas: 1
        extraEnv:
          - name: S3_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: loki-s3
                key: endpoint
          - name: S3_REGION
            valueFrom:
              secretKeyRef:
                name: loki-s3
                key: region
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: loki-s3
                key: access_key_id
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: loki-s3
                key: secret_access_key
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi

      backend:
        replicas: 0
      read:
        replicas: 0
      write:
        replicas: 0

      chunksCache:
        enabled: false
      resultsCache:
        enabled: false

      minio:
        enabled: false
