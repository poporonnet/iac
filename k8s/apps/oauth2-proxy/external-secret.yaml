apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: oauth2-proxy
  namespace: oauth2-proxy
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: oauth2-proxy
  data:
    - secretKey: client-id
      remoteRef:
        key: oauth2-proxy
        property: client_id
    - secretKey: client-secret
      remoteRef:
        key: oauth2-proxy
        property: client_secret
    - secretKey: cookie-secret
      remoteRef:
        key: oauth2-proxy
        property: cookie_secret
