apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana
  namespace: grafana
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: grafana
  data:
    - secretKey: admin-user
      remoteRef:
        key: grafana
        property: admin_user
    - secretKey: admin-password
      remoteRef:
        key: grafana
        property: admin_password
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
      remoteRef:
        key: grafana
        property: oidc_client_id
