apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: headlamp
resources:
  - ./resources/namespace.yaml
  - ./resources/external-secret.yaml
helmCharts:
  - name: headlamp
    repo: https://kubernetes-sigs.github.io/headlamp/
    version: "0.41.0"
    releaseName: headlamp
    namespace: headlamp
    valuesInline:
      config:
        oidc:
          clientID: "370589210324763360"
          issuerURL: https://zitadel.poporon.org
          scopes: "openid profile email"

      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.tls: "true"
        hosts:
          - host: headlamp.poporon.org
            paths:
              - path: /
                type: Prefix
        tls:
          - secretName: wildcard-poporon-org-tls
            hosts:
              - headlamp.poporon.org

      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 128Mi

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: headlamp
        namespace: headlamp
      spec:
        template:
          spec:
            containers:
              - name: headlamp
                env:
                  - $patch: replace
                  - name: OIDC_CLIENT_ID
                    valueFrom:
                      secretKeyRef:
                        name: headlamp
                        key: clientID
                  - name: OIDC_ISSUER_URL
                    value: "https://zitadel.poporon.org"
                  - name: OIDC_SCOPES
                    value: "openid profile email"
                  - name: OIDC_CALLBACK_URL
                    value: "https://headlamp.poporon.org/oidc/callback"
                  - name: OIDC_USE_PKCE
                    value: "true"
                  - name: OIDC_VALIDATOR_CLIENT_ID
                    valueFrom:
                      secretKeyRef:
                        name: headlamp
                        key: clientID
                  - name: OIDC_VALIDATOR_ISSUER_URL
                    value: "https://zitadel.poporon.org"
